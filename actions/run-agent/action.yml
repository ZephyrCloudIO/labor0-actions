name: Run Labor0 agent
description: Runs the requested agent runtime against the bootstrapped manifest prompt.
inputs:
  manifest_path:
    description: Path to the graph-agent execution manifest.
    required: true
outputs:
  result_path:
    description: Path to the result JSON emitted by the runner.
  graph_update_draft_path:
    description: Path to the graph update draft JSON parsed from a planning run.
  pull_requests_path:
    description: Path to the pull request event JSON array emitted by a coding run.
  debug_artifact_path:
    description: Path to sanitized debug diagnostics emitted when debug mode is enabled.
runs:
  using: node24
  main: index.js
