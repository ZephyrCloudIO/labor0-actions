name: Labor0 Agent Task

on:
  workflow_call:
    inputs:
      agent_task_session_id:
        description: Graph-agent task session id.
        required: true
        type: string
      graph_agent_base_url:
        description: Public graph-agent base URL.
        required: true
        type: string

permissions:
  contents: write
  id-token: write
  pull-requests: write

jobs:
  agent-task:
    name: Run agent task
    runs-on: ubuntu-latest
    steps:
      - name: Bootstrap graph-agent session
        id: bootstrap
        uses: ZephyrCloudIO/labor0-actions/actions/bootstrap@main
        with:
          agent_task_session_id: ${{ inputs.agent_task_session_id }}
          graph_agent_base_url: ${{ inputs.graph_agent_base_url }}

      - name: Checkout repositories
        uses: ZephyrCloudIO/labor0-actions/actions/checkout-repositories@main
        with:
          manifest_path: ${{ steps.bootstrap.outputs.manifest_path }}

      - name: Run agent
        id: run-agent
        uses: ZephyrCloudIO/labor0-actions/actions/run-agent@main
        with:
          manifest_path: ${{ steps.bootstrap.outputs.manifest_path }}

      - name: Upload debug diagnostics
        if: ${{ always() && steps.run-agent.outputs.debug_artifact_path != '' }}
        uses: actions/upload-artifact@v4
        with:
          name: labor0-agent-debug-${{ inputs.agent_task_session_id }}
          path: ${{ steps.run-agent.outputs.debug_artifact_path }}
          if-no-files-found: ignore
          retention-days: 7

      - name: Report graph update draft
        if: ${{ success() && steps.run-agent.outputs.graph_update_draft_path != '' }}
        uses: ZephyrCloudIO/labor0-actions/actions/report-event@main
        with:
          manifest_path: ${{ steps.bootstrap.outputs.manifest_path }}
          event_type: graph_update_draft
          graph_update_draft_path: ${{ steps.run-agent.outputs.graph_update_draft_path }}

      - name: Report pull requests
        if: ${{ success() && steps.run-agent.outputs.pull_requests_path != '' }}
        uses: ZephyrCloudIO/labor0-actions/actions/report-event@main
        with:
          manifest_path: ${{ steps.bootstrap.outputs.manifest_path }}
          event_type: pull_request_linked
          pull_requests_path: ${{ steps.run-agent.outputs.pull_requests_path }}

      - name: Report result
        if: always()
        uses: ZephyrCloudIO/labor0-actions/actions/report-event@main
        with:
          manifest_path: ${{ steps.bootstrap.outputs.manifest_path }}
          event_type: result
          result_path: ${{ steps.run-agent.outputs.result_path }}

      - name: Report completion
        if: ${{ success() }}
        uses: ZephyrCloudIO/labor0-actions/actions/report-event@main
        with:
          manifest_path: ${{ steps.bootstrap.outputs.manifest_path }}
          event_type: completed

      - name: Report failure
        if: ${{ failure() }}
        uses: ZephyrCloudIO/labor0-actions/actions/report-event@main
        with:
          manifest_path: ${{ steps.bootstrap.outputs.manifest_path }}
          event_type: failed
