name: Labor0 Agent Task

on:
  workflow_dispatch:
    inputs:
      agent_task_session_id:
        description: Graph-agent task session id.
        required: true
        type: string
      graph_agent_base_url:
        description: Public graph-agent base URL.
        required: true
        type: string

permissions:
  contents: read
  id-token: write
  pull-requests: write

jobs:
  labor0-agent-task:
    uses: ZephyrCloudIO/labor0-actions/.github/workflows/agent-task.yml@v1
    with:
      agent_task_session_id: ${{ inputs.agent_task_session_id }}
      graph_agent_base_url: ${{ inputs.graph_agent_base_url }}
